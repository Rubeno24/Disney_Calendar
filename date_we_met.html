<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date We Met 💖</title>
  <style>
    body {
      font-family: "Creepster", Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #1a0d0d);
      color: #ff7518;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 30px;
      text-shadow: 2px 2px 5px #000;
      color: #ffbf47;
    }

    #countup {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: nowrap;
      padding: 0 10px; 
    }

    .time-box {
      background: #2d1b1b;
      padding: 20px;
      border-radius: 12px;
      min-width: 80px;
      box-shadow: 0 4px 15px rgba(255,117,24,0.4);
      transition: transform 0.2s ease;
      flex: 0 0 auto;
    }

    .time-box:hover {
      transform: scale(1.08);
    }

    .number {
      font-size: 2.5rem;
      font-weight: bold;
      display: block;
      color: #ffbf47;
    }

    .label {
      font-size: 0.9rem;
      color: #fcd34d;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .time-box { padding: 15px; min-width: 70px; }
      .number { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <h1>💖 Days Since We Started Daiting 💖</h1>
  <div id="countup">
    <div class="time-box">
      <span class="number" id="days">0</span>
      <span class="label">Days</span>
    </div>
    <div class="time-box">
      <span class="number" id="hours">0</span>
      <span class="label">Hours</span>
    </div>
    <div class="time-box">
      <span class="number" id="minutes">0</span>
      <span class="label">Minutes</span>
    </div>
    <div class="time-box">
      <span class="number" id="seconds">0</span>
      <span class="label">Seconds</span>
    </div>
  </div>

  <script>
    const startDate = new Date("June 29, 2025 00:00:00").getTime();

    function updateCountUp() {
      const now = new Date().getTime();
      const distance = now - startDate;

      if (distance < 0) return; 

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = hours;
      document.getElementById("minutes").textContent = minutes;
      document.getElementById("seconds").textContent = seconds;
    }

    setInterval(updateCountUp, 1000);
    updateCountUp();
  </script>
</body>
</html>
