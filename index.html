<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halloween Countdown</title>
  <style>
    body {
      font-family: "Creepster", Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #1a0d0d);
      color: #ff7518;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* 🔹 Hamburger button */
    .menu-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 2rem;
      cursor: pointer;
      z-index: 1001;
      color: #ff7518;
    }

    /* 🔹 Side menu panel */
    .side-menu {
      height: 100%;
      width: 0; /* hidden by default */
      position: fixed;
      top: 0;
      left: 0;
      background: #1a0d0d;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
      z-index: 1000;
    }

    .side-menu a {
      padding: 10px 20px;
      text-decoration: none;
      font-size: 1.2rem;
      color: #ffbf47;
      display: block;
      transition: 0.2s;
    }

    .side-menu a:hover {
      background: #2d1b1b;
      color: #fcd34d;
    }

    /* Close button inside menu */
    .side-menu .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 2rem;
      cursor: pointer;
      color: #ff7518;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 30px;
      text-shadow: 2px 2px 5px #000;
    }

    #countdown {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: nowrap;
      overflow-x: auto;  
      padding: 0 10px; 
    }

    .time-box {
      background: #2d1b1b;
      padding: 20px;
      border-radius: 12px;
      min-width: 80px;
      box-shadow: 0 4px 15px rgba(255,117,24,0.4);
      transition: transform 0.2s ease;
      flex: 0 0 auto;
    }

    .time-box:hover {
      transform: scale(1.08);
    }

    .number {
      font-size: 2.5rem;
      font-weight: bold;
      display: block;
      color: #ffbf47;
    }

    .label {
      font-size: 0.9rem;
      color: #fcd34d;
    }

    /* floating bats */
    .bat {
      position: absolute;
      font-size: 2rem;
      animation: fly 10s linear infinite;
      user-select: none;
    }
    .bat:nth-child(1) { top: 15%; left: -50px; animation-delay: 0s; }
    .bat:nth-child(2) { top: 40%; left: -80px; animation-delay: 2s; }
    .bat:nth-child(3) { top: 70%; left: -60px; animation-delay: 4s; }

    @keyframes fly {
      0% { transform: translateX(0) scale(1); opacity: 0.7; }
      50% { transform: translateX(100vw) scale(1.2); opacity: 1; }
      100% { transform: translateX(0) scale(1); opacity: 0.7; }
    }

    @media (max-width: 600px) {
      body {
        padding: 20px 40px;
      }
      h1 { font-size: 1.8rem; }
      .time-box { padding: 15px; min-width: 70px; }
      .number { font-size: 2rem; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 🔹 Hamburger button -->
  <span class="menu-btn" onclick="openMenu()">☰</span>

  <!-- 🔹 Side menu -->
  <div id="sideMenu" class="side-menu">
    <span class="close-btn" onclick="closeMenu()">×</span>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
  </div>

  <h1>🎃 Countdown to Disney 🎃</h1>
  <div id="countdown">
    <div class="time-box">
      <span class="number" id="days">0</span>
      <span class="label">Days</span>
    </div>
    <div class="time-box">
      <span class="number" id="hours">0</span>
      <span class="label">Hours</span>
    </div>
    <div class="time-box">
      <span class="number" id="minutes">0</span>
      <span class="label">Minutes</span>
    </div>
    <div class="time-box">
      <span class="number" id="seconds">0</span>
      <span class="label">Seconds</span>
    </div>
  </div>

  <!-- bats -->
  <div class="bat">🦇</div>
  <div class="bat">🦇</div>
  <div class="bat">🦇</div>

  <script>
    // 🔹 Open/Close menu
    function openMenu() {
      document.getElementById("sideMenu").style.width = "250px";
    }
    function closeMenu() {
      document.getElementById("sideMenu").style.width = "0";
    }

    const targetDate = new Date("October 2, 2025 08:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.getElementById("countdown").innerHTML = "<h2>🎃 Time to go to Disney!!!! 👻</h2>";
        clearInterval(timer);
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = hours;
      document.getElementById("minutes").textContent = minutes;
      document.getElementById("seconds").textContent = seconds;
    }

    const timer = setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
