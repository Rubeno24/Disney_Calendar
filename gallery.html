<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disney Gallery</title>
  <style>
    body {
      background:#111;
      color:#fff;
      text-align:center;
      font-family: "Creepster", Arial, sans-serif;
      margin:0;
    }
    h1 { margin-top:20px; font-size:2rem; }

    /* Controls bar */
    .controls {
      margin:15px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }
    .controls input, .controls button {
      font-size:1rem;
      padding:8px 12px;
      border-radius:6px;
      border:none;
      cursor:pointer;
    }
    .controls button {
      background:#444;
      color:#fff;
    }
    .controls button:hover {
      background:#666;
    }

    /* Gallery grid */
    .gallery { 
      display:grid; 
      grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); 
      gap:15px; 
      padding:20px; 
    }
    .photo-card { 
      background:#222; 
      padding:10px; 
      border-radius:8px; 
      box-shadow:0 4px 10px rgba(0,0,0,0.6); 
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .photo-card img { width:100%; border-radius:6px; margin-bottom:8px; }

    .delete-btn {
      background:#ff4444; 
      color:#fff; 
      border:none; 
      padding:5px 10px;
      border-radius:4px; 
      cursor:pointer; 
      font-size:0.9rem;
    }
    .delete-btn:hover { background:#cc0000; }

    /* Mobile tweaks */
    @media (max-width: 500px) {
      h1 { font-size:1.5rem; }
      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap:10px;
      }
      .controls input, .controls button {
        font-size:0.9rem;
        padding:6px 10px;
      }
    }

    /* 🔹 Hamburger button */
    .menu-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 2rem;
      cursor: pointer;
      z-index: 1001;
      color: #ff7518;
    }

    /* 🔹 Side menu panel */
    .side-menu {
      height: 100%;
      width: 0; /* hidden by default */
      position: fixed;
      top: 0;
      left: 0;
      background: #1a0d0d;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
      z-index: 1000;
    }

    .side-menu a {
      padding: 10px 20px;
      text-decoration: none;
      font-size: 1.2rem;
      color: #ffbf47;
      display: block;
      transition: 0.2s;
    }

    .side-menu a:hover {
      background: #2d1b1b;
      color: #fcd34d;
    }

    /* Close button inside menu */
    .side-menu .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 2rem;
      cursor: pointer;
      color: #ff7518;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 🔹 Hamburger button -->
  <span class="menu-btn" onclick="openMenu()">☰</span>

  <!-- 🔹 Side menu -->
  <div id="sideMenu" class="side-menu">
    <span class="close-btn" onclick="closeMenu()">×</span>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
  </div>

  <h1>Disney Gallery</h1>

  <div class="controls">
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload</button>
    <button id="editToggle" onclick="toggleEdit()">Edit</button>
  </div>

  <div class="gallery" id="gallery"></div>

  <script>
    const USER = "Rubeno24";
    const REPO = "Disney_Calendar";
    const BRANCH = "main";
    const VERCEL_API = "https://disney-calendar.vercel.app/api/github";

    let editMode = false; // track edit mode

    // 🔹 Open/Close side menu
    function openMenu() {
      document.getElementById("sideMenu").style.width = "250px";
    }
    function closeMenu() {
      document.getElementById("sideMenu").style.width = "0";
    }

    // Upload a file via Vercel function
    async function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      if (!fileInput.files.length) return alert("Pick a file!");

      const file = fileInput.files[0];
      const reader = new FileReader();

      reader.onloadend = async () => {
        const content = reader.result.split(",")[1];

        const response = await fetch(VERCEL_API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "upload",
            filename: file.name,
            content: content
          })
        });

        if (response.ok) {
          loadGallery(); // refresh gallery
        } else {
          alert("❌ Upload failed");
        }
      };

      reader.readAsDataURL(file);
    }

    // Delete a file via Vercel function
    async function deleteFile(filename, sha) {
      if (!confirm(`Delete ${filename}?`)) return;

      const response = await fetch(VERCEL_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "delete",
          filename: filename,
          sha: sha
        })
      });

      if (response.ok) {
        loadGallery(); 
      } else {
        alert("❌ Delete failed");
      }
    }

    function toggleEdit() {
      editMode = !editMode;
      document.getElementById("editToggle").innerText = editMode ? "Done" : "Edit";
      loadGallery();
    }

    // List files from GitHub directly (safe, read-only)
    async function loadGallery() {
      const url = `https://api.github.com/repos/${USER}/${REPO}/contents/images?t=${Date.now()}`;
      const response = await fetch(url);
      const files = await response.json();

      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";

      if (!Array.isArray(files)) return; // handles empty or error

      files.forEach(file => {
        if (file.type === "file") {
          const card = document.createElement("div");
          card.className = "photo-card";

          const img = document.createElement("img");
          img.src = `https://raw.githubusercontent.com/${USER}/${REPO}/${BRANCH}/images/${file.name}?t=${Date.now()}`;
          img.alt = file.name;
          card.appendChild(img);

          if (editMode) {
            const btn = document.createElement("button");
            btn.innerText = "Delete";
            btn.className = "delete-btn";
            btn.onclick = () => deleteFile(file.name, file.sha);
            card.appendChild(btn);
          }

          gallery.appendChild(card);
        }
      });
    }

    loadGallery(); // load on page open
  </script>
</body>
</html>
