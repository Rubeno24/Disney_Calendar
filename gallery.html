<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery</title>
  <style>
    body {
      background:#111;
      color:#fff;
      text-align:center;
      font-family: "Creepster", Arial, sans-serif;
      margin:0;
    }
    h1 { margin-top:20px; font-size:2rem; }

    /* Controls bar */
    .controls {
      margin:15px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }
    .controls input, .controls button {
      font-size:1rem;
      padding:8px 12px;
      border-radius:6px;
      border:none;
      cursor:pointer;
    }
    .controls button {
      background:#444;
      color:#fff;
    }
    .controls button:hover {
      background:#666;
    }

    /* Gallery grid */
    .gallery { 
      display:grid; 
      grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); 
      gap:15px; 
      padding:20px; 
    }
    .photo-card { 
      background:#222; 
      padding:10px; 
      border-radius:8px; 
      box-shadow:0 4px 10px rgba(0,0,0,0.6); 
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .photo-card img { width:100%; border-radius:6px; margin-bottom:8px; }

    .delete-btn {
      background:#ff4444; 
      color:#fff; 
      border:none; 
      padding:5px 10px;
      border-radius:4px; 
      cursor:pointer; 
      font-size:0.9rem;
    }
    .delete-btn:hover { background:#cc0000; }

    /* 🔹 Hamburger button */
    .menu-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 2rem;
      cursor: pointer;
      z-index: 1001;
      color: #ca008e;
    }

    /* 🔹 Side menu panel */
    .side-menu {
      height: 100%;
      width: 0;
      position: fixed;
      top: 0;
      left: 0;
      background: #1a0d0d;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
      z-index: 1000;
    }
    .side-menu a {
      padding: 10px 20px;
      text-decoration: none;
      font-size: 1.2rem;
      color: #ffffff;
      display: block;
      transition: 0.2s;
    }
    .side-menu a:hover {
      background: #2d1b1b;
      color: #fcd34d;
    }
    .side-menu .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 2rem;
      cursor: pointer;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <!-- 🔹 Hamburger button -->
  <span class="menu-btn" onclick="openMenu()">☰</span>

  <!-- 🔹 Side menu -->
  <div id="sideMenu" class="side-menu">
    <span class="close-btn" onclick="closeMenu()">×</span>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
  </div>

  <!-- Page content (hidden until password is correct) -->
  <div id="protectedContent" style="display:none;">
    <h1>Photo Gallery</h1>

    <div class="controls">
      <input type="file" id="fileInput">
      <button onclick="uploadFile()">Upload</button>
      <button id="editToggle" onclick="toggleEdit()">Edit</button>
    </div>

    <div class="gallery" id="gallery"></div>
  </div>

  <script type="module">
    // -----------------------------
    // Supabase config
    // -----------------------------
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const SUPABASE_URL = "https://fsrztznqbrsxrcwwpmfy.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_FTaWRH6NvDRjN4ffxrJh-A_bMLKPgTQ";
    const BUCKET_NAME = "photos";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let editMode = false; 

    // 🔹 Open/Close side menu
    window.openMenu = function () {
      document.getElementById("sideMenu").style.width = "250px";
    };

    window.closeMenu = function () {
      document.getElementById("sideMenu").style.width = "0";
    };

    // Upload a file to Supabase Storage
    window.uploadFile = async function () {
      const fileInput = document.getElementById("fileInput");
      if (!fileInput.files.length) {
        alert("Pick a file!");
        return;
      }

      const file = fileInput.files[0];
      const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
      const filePath = `${Date.now()}-${safeName}`;

      const { error } = await supabase.storage
        .from(BUCKET_NAME)
        .upload(filePath, file, {
          cacheControl: "3600",
          upsert: false,
          contentType: file.type
        });

      if (error) {
        console.error("Upload failed:", error);
        alert("❌ Upload failed");
        return;
      }

      fileInput.value = "";
      loadGallery();
    };

    // Delete a file from Supabase Storage
    async function deleteFile(filename) {
      if (!confirm(`Delete ${filename}?`)) return;

      const { error } = await supabase.storage
        .from(BUCKET_NAME)
        .remove([filename]);

      if (error) {
        console.error("Delete failed:", error);
        alert("❌ Delete failed");
        return;
      }

      loadGallery();
    }

    window.toggleEdit = function () {
      editMode = !editMode;
      document.getElementById("editToggle").innerText = editMode ? "Done" : "Edit";
      loadGallery();
    };

    // Load files from Supabase Storage
    async function loadGallery() {
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";

      const { data: files, error } = await supabase.storage
        .from(BUCKET_NAME)
        .list("", {
          limit: 100,
          offset: 0,
          sortBy: { column: "created_at", order: "desc" }
        });

      if (error) {
        console.error("Gallery load failed:", error);
        gallery.innerHTML = "<p>Could not load gallery.</p>";
        return;
      }

      if (!Array.isArray(files) || files.length === 0) {
        gallery.innerHTML = "<p>No photos yet.</p>";
        return;
      }

      files.forEach(file => {
        if (!file.name) return;

        const card = document.createElement("div");
        card.className = "photo-card";

        const img = document.createElement("img");
        const { data: publicUrlData } = supabase.storage
          .from(BUCKET_NAME)
          .getPublicUrl(file.name);

        img.src = `${publicUrlData.publicUrl}?t=${Date.now()}`;
        img.alt = file.name;
        card.appendChild(img);

        if (editMode) {
          const btn = document.createElement("button");
          btn.innerText = "Delete";
          btn.className = "delete-btn";
          btn.onclick = () => deleteFile(file.name);
          card.appendChild(btn);
        }

        gallery.appendChild(card);
      });
    }

    // 🔹 Simple password protection with session storage
    const PASSWORD = "Liz"; 
    function checkPassword() {
      if (sessionStorage.getItem("authenticated") === "true") {
        document.getElementById("protectedContent").style.display = "block";
        loadGallery();
        return;
      }
      const entered = prompt("Enter password to access Disney Gallery:");
      if (entered === PASSWORD) {
        sessionStorage.setItem("authenticated", "true");
        document.getElementById("protectedContent").style.display = "block";
        loadGallery();
      } else {
        document.body.innerHTML = "<h2 style='color:red; margin-top:20%;'>🚫 Access Denied</h2>";
      }
    }

    checkPassword();
  </script>
</body>
</html>
